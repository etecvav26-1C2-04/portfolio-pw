<!DOCTYPE html> 
<html lang="en"> 
  
<head> 
    <link rel="stylesheet" type="text/css" href="H20-Style.css"> 
    <meta charset="UTF-8"> 
    <meta name="viewport" content="width=device-width, initial-scale=1.0"> 
    <title>Vinícola H20</title> 
    <style> 
   .image-container { 
     float: left;  
     margin-right: 10px; 
   } 
    .btn { 
         display: inline-block; 
        padding: 10px 20px; 
        background-color: rgb(255, 223, 152); 
        color: rgb(112, 5, 13); 
        text-decoration: none; 
        border: 5px; 
        border-radius: 5px; 
        font-size: 16px; 
        font-family: "Modern Antiqua", serif 
        } 

    .btn:hover { 
            background-color: rgb(218, 166, 107); 
        } 
    .container { 
        text-align: center; 
    } 
    </style> 
    </head>
    <body> 
         <div class="image-container"> 
    <img src="DecoEsq.png" width="320" height="180"> 
    </div> 
    <h1>Encomende já!</h1>
    <form> 
        <label for="vinho">Tipo de vinho:</label><br><br> 
        <input type="text" id="vinho" name="vinho"><br><br> 
        <label for="quantidade">Quantidade:</label><br><br> 
        <input type="number" id="quantidade" name="quantidade"><br><br> 
        <label for="telefone">Telefone p/contato</label><br><br> 
        <input type="tel" id="telefone" name="telefone"><br><br> 
        <input type="submit" value="Encomendar"><br><br> 
        <input type="reset" value="Resetar"> 
    </form> 
    <br> 
    <br> 
    <br> 
    <div class="container"> 
<a href="H20.html" class="btn">Voltar</a> 
</div> 
</body> 
</html>
